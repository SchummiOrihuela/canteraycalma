<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Fondo cuadrado redondeado -->
  <rect x="0" y="0" width="512" height="512" rx="90" fill="#2d1507"/>

  <!-- Sol — círculo terracota -->
  <circle cx="256" cy="108" r="52" fill="#8B5E3C"/>
  <!-- Rayo sutil bajo el sol -->
  <rect x="248" y="153" width="16" height="28" rx="4" fill="#8B5E3C" opacity="0.45"/>

  <!-- Colina verde de fondo -->
  <ellipse cx="256" cy="375" rx="215" ry="88" fill="#4A7C6F" opacity="0.30"/>

  <!-- Pirámide escalonada — 4 niveles -->
  <!-- Base -->
  <rect x="90"  y="342" width="332" height="38" rx="5" fill="#8B5E3C"/>
  <!-- Nivel 2 -->
  <rect x="132" y="304" width="248" height="40" rx="5" fill="#9E6D47"/>
  <!-- Nivel 3 -->
  <rect x="178" y="266" width="156" height="40" rx="5" fill="#B07D55"/>
  <!-- Nivel 4 cima -->
  <rect x="212" y="228" width="88"  height="40" rx="5" fill="#C08E63"/>

  <!-- Templo en la cima -->
  <rect x="224" y="192" width="64" height="38" rx="4" fill="#4A7C6F"/>
  <!-- Puerta del templo -->
  <rect x="247" y="210" width="18" height="20" rx="2" fill="#2d1507"/>

  <!-- Escalinata central sutil -->
  <rect x="252" y="228" width="8" height="114" rx="2" fill="rgba(255,255,255,0.13)"/>

  <!-- Vegetación izquierda -->
  <circle cx="128" cy="312" r="20" fill="#4A7C6F" opacity="0.72"/>
  <circle cx="106" cy="334" r="15" fill="#3a6358" opacity="0.60"/>
  <circle cx="152" cy="298" r="13" fill="#5a9080" opacity="0.50"/>

  <!-- Vegetación derecha -->
  <circle cx="384" cy="312" r="20" fill="#4A7C6F" opacity="0.72"/>
  <circle cx="406" cy="334" r="15" fill="#3a6358" opacity="0.60"/>
  <circle cx="360" cy="298" r="13" fill="#5a9080" opacity="0.50"/>
</svg>
